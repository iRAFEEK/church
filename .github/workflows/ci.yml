name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Type-check, tests, RTL
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check (0 errors required)
        run: npm run typecheck

      - name: Unit + integration tests
        run: npm test

      - name: RTL violation check (must be 0)
        run: |
          count=$(grep -rn "\bml-[0-9]\|\bmr-[0-9]\|\btext-right\b\|\btext-left\b" \
            app/ components/ --include="*.tsx" | grep -v "//" | wc -l | tr -d ' ')
          echo "RTL violations: $count"
          if [ "$count" -ne 0 ]; then
            echo "::error::Found $count RTL violation(s). Use logical properties (ms-/me-/ps-/pe-/text-start/text-end)."
            grep -rn "\bml-[0-9]\|\bmr-[0-9]\|\btext-right\b\|\btext-left\b" \
              app/ components/ --include="*.tsx" | grep -v "//"
            exit 1
          fi

      - name: Translation key parity (en / ar / ar-eg)
        run: |
          node -e '
            const fs = require("fs");
            const leaves = (o, p = "", a = {}) => {
              for (const k in o) {
                const v = o[k], np = p ? p + "." + k : k;
                if (v && typeof v === "object" && !Array.isArray(v)) leaves(v, np, a);
                else a[np] = v;
              }
              return a;
            };
            const en = leaves(JSON.parse(fs.readFileSync("messages/en.json")));
            let bad = 0;
            for (const loc of ["ar", "ar-eg"]) {
              const m = leaves(JSON.parse(fs.readFileSync(`messages/${loc}.json`)));
              const missing = Object.keys(en).filter(k => !(k in m));
              if (missing.length) {
                bad += missing.length;
                console.error(`${loc}: ${missing.length} missing keys (first 10): ${missing.slice(0,10).join(", ")}`);
              }
            }
            if (bad) { console.error(`::error::${bad} missing translation key(s)`); process.exit(1); }
            console.log("Translation parity OK");
          '

  # End-to-end journey suite (Playwright, against a production build).
  # Gated: runs ONLY when a DISPOSABLE test Supabase project is wired up — set the
  # repository variable RUN_E2E=true (Settings → Secrets and variables → Actions →
  # Variables), plus:
  #   Secrets: E2E_DATABASE_URL, NEXT_PUBLIC_SUPABASE_URL, NEXT_PUBLIC_SUPABASE_ANON_KEY,
  #            SUPABASE_SERVICE_ROLE_KEY
  #   Variables: E2E_MEMBER_ID, E2E_GROUP_ID, E2E_MINISTRY_ID, E2E_EVENT_ID, E2E_SLOT_ID,
  #              E2E_CHURCH_ID  (the row ids present in that seeded test DB)
  # Until RUN_E2E is set, this job is skipped so CI stays green out of the box.
  e2e:
    name: E2E journeys (Playwright)
    needs: quality
    if: ${{ vars.RUN_E2E == 'true' }}
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      DATABASE_URL: ${{ secrets.E2E_DATABASE_URL }}
      E2E_BASE_URL: http://localhost:3000
      E2E_MEMBER_EMAIL: member@gracechurch.test
      E2E_MEMBER_PASSWORD: password123
      E2E_ADMIN_EMAIL: pastor@gracechurch.test
      E2E_ADMIN_PASSWORD: password123
      E2E_LEADER_EMAIL: leader1@gracechurch.test
      E2E_LEADER_PASSWORD: password123
      E2E_MINLEADER_EMAIL: worship@gracechurch.test
      E2E_MINLEADER_PASSWORD: password123
      E2E_ONBOARDING_EMAIL: newmember@gracechurch.test
      E2E_ONBOARDING_PASSWORD: password123
      E2E_NEWUSER_EMAIL: e2e-newuser@gracechurch.test
      E2E_NEWUSER_PASSWORD: password123
      E2E_CHURCHB_EMAIL: admin@hopebeirut.org
      E2E_CHURCHB_PASSWORD: password123
      E2E_MEMBER_ID: ${{ vars.E2E_MEMBER_ID }}
      E2E_GROUP_ID: ${{ vars.E2E_GROUP_ID }}
      E2E_MINISTRY_ID: ${{ vars.E2E_MINISTRY_ID }}
      E2E_EVENT_ID: ${{ vars.E2E_EVENT_ID }}
      E2E_SLOT_ID: ${{ vars.E2E_SLOT_ID }}
      E2E_CHURCH_ID: ${{ vars.E2E_CHURCH_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: npm
      - run: npm ci
      - name: Install Playwright chromium
        run: npx playwright install --with-deps chromium
      - name: Build (production)
        run: npm run build
      - name: Start server + run journey suite
        run: |
          npm run start &
          for i in $(seq 1 30); do curl -sf http://localhost:3000 >/dev/null && break; sleep 2; done
          npm run test:e2e -- --project=chromium
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7
